<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express + MongoDB Atlas</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🚀 Express + MongoDB Atlas</h1>
            <p>Повна система управління користувачами з боку сервера</p>
        </header>

        <div class="content">
            <div class="form-section">
                <h2>➕ Додати нового користувача</h2>
                <div class="form-group">
                    <input type="text" id="name" placeholder="Ім'я">
                    <input type="email" id="email" placeholder="Email">
                    <input type="number" id="age" placeholder="Вік">
                    <input type="text" id="city" placeholder="Місто">
                </div>
                <div class="button-group">
                    <button class="btn-add" onclick="addUser()">Додати користувача</button>
                    <button class="btn-clear" onclick="clearForm()">Очистити</button>
                    <button class="btn-refresh" onclick="loadUsers()">🔄 Оновити список</button>
                </div>
                <div id="status"></div>
            </div>

            <div class="users-section">
                <h2>👥 Список користувачів</h2>
                <div id="usersList" class="users-grid">
                    <div class="empty-state">
                        <p>Завантаження даних...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
